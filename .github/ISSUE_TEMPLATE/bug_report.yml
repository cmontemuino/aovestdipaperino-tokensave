name: Bug Report
description: Report a bug in tokensave
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: tokensave version
      description: Run `tokensave --version`
      placeholder: "3.2.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - cargo install
        - Homebrew (brew)
        - Scoop
        - Built from source
        - GitHub release binary
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `tokensave sync` on my project, it fails with..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1.
        2.
        3.

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste any error messages, stack traces, or relevant logs.
      render: shell

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of tokensave is affected?
      options:
        - Indexing / sync
        - MCP server
        - CLI
        - Daemon / file watcher
        - Agent integration (Claude, Cursor, etc.)
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (config, project structure, etc.).
