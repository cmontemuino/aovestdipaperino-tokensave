[package]
name = "tokensave"
version = "1.6.1"
edition = "2021"
description = "Code intelligence tool that builds a semantic knowledge graph from Rust, Go, Java, Scala, TypeScript, JavaScript, Python, C, C++, Kotlin, Dart, C#, Pascal, PHP, and Ruby codebases"
license = "MIT"
repository = "https://github.com/aovestdipaperino/tokensave"
homepage = "https://github.com/aovestdipaperino/tokensave"
readme = "README.md"
keywords = ["code-intelligence", "knowledge-graph", "mcp", "tree-sitter", "claude"]
categories = ["development-tools", "command-line-utilities"]

[lib]
name = "tokensave"

[[bin]]
name = "tokensave"
path = "src/main.rs"

[dependencies]
libsql = "0.9.30"
tree-sitter = "0.26"
tree-sitter-rust = "0.24"
tree-sitter-go = "0.25"
tree-sitter-java = "0.23"
tree-sitter-scala = "0.25"
tree-sitter-typescript = "0.23"
tree-sitter-javascript = "0.25"
tree-sitter-python = "0.25"
tree-sitter-c = "0.24"
tree-sitter-c-sharp = "0.23"
tree-sitter-cpp = "0.23"
ort = { version = "2.0.0-rc.12", features = ["load-dynamic"] }
ndarray = "0.17"
clap = { version = "4.6", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "1"
ureq = { version = "3", features = ["json"] }
tokio = { version = "1", features = ["full"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
sha2 = "0.10"
glob = "0.3"
walkdir = "2"
dirs = "6"
hex = "0.4"
tree-sitter-dart-orchard = "0.3"
tree-sitter-kotlin-sg = "0.4.0"
tree-sitter-pascal = "0.10"
tree-sitter-php = "0.24.2"
tree-sitter-ruby = "0.23.1"

[build-dependencies]
logo-art = "0.2"

[dev-dependencies]
tempfile = "3"
